procs:
  infra:
    shell: docker compose up
    stop: SIGINT
    autostart: false

  setup-sqs:
    shell: "sleep 3 && docker compose exec -T localstack awslocal sqs create-queue --queue-name reservation-confirm-dlq 2>/dev/null || true && docker compose exec -T localstack awslocal sqs create-queue --queue-name reservation-confirm --attributes '{\"RedrivePolicy\":\"{\\\"deadLetterTargetArn\\\":\\\"arn:aws:sqs:us-east-1:000000000000:reservation-confirm-dlq\\\",\\\"maxReceiveCount\\\":\\\"3\\\"}\",\"VisibilityTimeout\":\"30\"}' 2>/dev/null || true && docker compose exec -T localstack awslocal sqs list-queues"
    autostart: false

  prisma-generate:
    shell: pnpm dlx prisma generate
    autostart: false

  prisma-migrate:
    shell: pnpm dlx prisma migrate dev
    autostart: false

  api:
    shell: pnpm run start:dev
    stop: SIGINT
    autostart: false

  studio:
    shell: pnpm dlx prisma studio
    stop: SIGINT
    autostart: false

  test-health:
    shell: "curl -s http://localhost:3000/health | python3 -m json.tool"
    autostart: false
