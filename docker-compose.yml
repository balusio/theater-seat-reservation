services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reservation_user
      POSTGRES_PASSWORD: reservation_pass
      POSTGRES_DB: reservation_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U reservation_user -d reservation_db']
      interval: 5s
      retries: 5

  localstack:
    image: localstack/localstack:latest
    ports:
      - '4566:4566'
    environment:
      - SERVICES=sqs
      - DEBUG=0
      - DEFAULT_REGION=us-east-1
    volumes:
      - './init-localstack.sh:/etc/localstack/init/ready.d/init.sh'
    healthcheck:
      test: ['CMD-SHELL', 'awslocal sqs list-queues']
      interval: 10s
      retries: 5

volumes:
  pgdata:
